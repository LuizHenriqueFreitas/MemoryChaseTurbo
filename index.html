<!--
  ============================================================================
   index.html — PÁGINA HOSPEDEIRA DO JOGO (PONTO DE ENTRADA WEB)
  ============================================================================

   Página HTML mínima que o navegador (e o Vite) carregam primeiro. Ela não
   contém o jogo em si: apenas estiliza a página (fundo preto, jogo centralizado
   e com uma borda branca) e importa o script principal `src/main.ts`, que cria
   o jogo Phaser. O Phaser, por sua vez, injeta o <canvas> onde tudo é desenhado.

   O atributo type="module" habilita os imports ES e permite que o Vite faça o
   bundling do TypeScript em tempo de desenvolvimento e build.
  ============================================================================
-->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Asteroid Shooter - Top Gear Style</title>
    <style>
        body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        canvas { border: 2px solid #fff; }
    </style>
</head>
<body>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
